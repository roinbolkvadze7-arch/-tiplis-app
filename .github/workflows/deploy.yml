name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase anon key
        env:
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$ANON" ]; then
            echo "::error::Secret SUPABASE_ANON_KEY is empty. Add it: Repo Settings → Secrets → Actions."
            exit 1
          fi
          sed -i "s#YOUR_SUPABASE_ANON_KEY#$ANON#g" index.html
          if grep -q 'YOUR_SUPABASE_ANON_KEY' index.html; then
            echo "::error::Placeholder was not replaced — check index.html contains exactly YOUR_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
