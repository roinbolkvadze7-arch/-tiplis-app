name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node ინაცვლებს უსაფრთხოდ (sed აფუჭებს JWT-ს თუ შიგნით არის & ან სხვა სპეც. სიმბოლო)
      - name: Inject Supabase anon key
        env:
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODEEOF'
          const fs = require('fs');
          const k = (process.env.ANON || '').trim();
          if (!k) {
            console.error('::error::SUPABASE_ANON_KEY ცარიელია. დაამატე: Settings → Secrets → Actions (ან Environment github-pages → secrets).');
            process.exit(1);
          }
          let html = fs.readFileSync('index.html', 'utf8');
          const ph = 'YOUR_SUPABASE_ANON_KEY';
          if (!html.includes(ph)) {
            console.error('::error::index.html-ში არ მოიძებნა ' + ph);
            process.exit(1);
          }
          html = html.split(ph).join(k);
          if (html.includes(ph)) {
            console.error('::error::ჩანაცვლება ვერ დასრულდა');
            process.exit(1);
          }
          fs.writeFileSync('index.html', html);
          console.log('Supabase anon injected, length:', k.length);
          NODEEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
